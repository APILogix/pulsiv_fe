<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse — API observability</title>
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease-in-out;
      }
      #initial-loader svg {
        width: 80px;
        height: 80px;
        animation: pulse-logo 1.5s ease-in-out infinite alternate;
      }
      @keyframes pulse-logo {
        0% { transform: scale(0.95); opacity: 0.8; }
        100% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 10px rgba(52, 211, 153, 0.4)); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="neonPulse" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#34d399" />
            <stop offset="100%" stop-color="#6366f1" />
          </linearGradient>
          <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <g filter="url(#neonGlow)">
          <!-- Outer rotating dashed ring -->
          <circle cx="60" cy="60" r="45" fill="none" stroke="url(#neonPulse)" stroke-width="2" stroke-dasharray="10 15" opacity="0.6">
            <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="12s" repeatCount="indefinite" />
          </circle>
          
          <!-- Inner pulsing ring -->
          <circle cx="60" cy="60" r="32" fill="none" stroke="url(#neonPulse)" stroke-width="4" opacity="0.8">
            <animate attributeName="r" values="30; 34; 30" dur="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.4; 0.9; 0.4" dur="2s" repeatCount="indefinite" />
          </circle>
          
          <!-- Core waveform -->
          <path d="M 35 60 L 45 60 L 52 42 L 68 78 L 75 60 L 85 60" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
            <animate attributeName="stroke-width" values="3; 5; 3" dur="2s" repeatCount="indefinite" />
          </path>
        </g>
      </svg>
    </div>
    <div id="pulse-root">
      <div id="root"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const observer = new MutationObserver((mutations, obs) => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
          }
          obs.disconnect();
        }
      });
      observer.observe(document.getElementById('pulse-root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
