<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse — API observability</title>
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease-in-out;
      }
      #initial-loader svg {
        width: 260px;
        height: 160px;
      }
      @keyframes letterIn { 0%{opacity:0; transform:translateY(14px);} 8%{opacity:1; transform:translateY(0);} 68%{opacity:1;} 82%{opacity:0;} 100%{opacity:0;} }
      .wl { animation:letterIn 5s ease-in-out infinite; }
      .wl0 { animation-delay:0s; } .wl1 { animation-delay:0.12s; } .wl2 { animation-delay:0.24s; }
      .wl3 { animation-delay:0.36s; } .wl4 { animation-delay:0.48s; } .wl5 { animation-delay:0.6s; }
      .burstring { fill:none; stroke:#34d399; opacity:0; animation:burstGo 5s ease-out infinite; }
      @keyframes burstGo { 0%,44%{ r:2; opacity:0;} 46%{ opacity:0.8; stroke-width:2;} 70%{ r:95; opacity:0; stroke-width:0.3;} 100%{opacity:0;} }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <svg width="260" height="160" viewBox="0 0 260 160" xmlns="http://www.w3.org/2000/svg" aria-label="Pulsiv loading">
        <circle class="burstring" cx="130" cy="80" r="2"/>
        <text x="130" y="88" font-family='ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace' font-weight="700" font-size="34" letter-spacing="4" text-anchor="middle">
          <tspan class="wl wl0" fill="#ffffff">P</tspan><tspan class="wl wl1" fill="#ffffff">U</tspan><tspan class="wl wl2" fill="#ffffff">L</tspan><tspan class="wl wl3" fill="#ffffff">S</tspan><tspan class="wl wl4" fill="#34d399">I</tspan><tspan class="wl wl5" fill="#ffffff">V</tspan>
        </text>
      </svg>
    </div>
    <div id="pulse-root">
      <div id="root"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const observer = new MutationObserver((mutations, obs) => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
          }
          obs.disconnect();
        }
      });
      observer.observe(document.getElementById('pulse-root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
